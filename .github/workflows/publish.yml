name: Publicar no PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Construir e Publicar
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mads-market-helper
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clonar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar o construtor (build)
        run: python -m pip install build

      - name: Construir o pacote (Criar a pasta dist virtualmente)
        run: python -m build

      - name: Publicar no PyPI Oficial
        uses: pypa/gh-action-pypi-publish@release/v1
